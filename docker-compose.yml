services:
  freshcart-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: freshcart-app
    restart: unless-stopped

    # 🔒 Only allow Nginx on the same server to reach it
    ports:
      - "127.0.0.1:4000:3000"

    env_file:
      - .env
    environment:
      NODE_ENV: "production"

    security_opt:
      - no-new-privileges:true

    # Optional hardening (remove if your app crashes)
    read_only: true
    tmpfs:
      - /tmp
      - /var/tmp

    # Keep only ONE PID limiter (this one)
    pids_limit: 200

    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
